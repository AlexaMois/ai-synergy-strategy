name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Inspect dist (debug)
        run: |
          echo "=== dist root ==="
          ls -la dist | head -40
          echo "=== sample rendered route head ==="
          for r in about pricing services/digital-tools-program services/automation materials/blog/rag-dlya-biznesa; do
            f="dist/$r/index.html"
            if [ -f "$f" ]; then
              echo "--- $f ($(wc -c < "$f") bytes) ---"
              grep -E "<title>|canonical|og:url" "$f" | head -5
            else
              echo "MISSING $f"
            fi
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
